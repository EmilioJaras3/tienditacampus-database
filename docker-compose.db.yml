version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tc-prod-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-tienditacampus}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Se asume que init, migrations, scripts, y seeds están en el mismo directorio que este compose
      - ./init:/docker-entrypoint-initdb.d
      - ./migrations:/migrations
      - ./scripts:/scripts
      - ./seeds:/seeds

  mongo:
    image: mongo:7
    container_name: tc-prod-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
